_base_: ["../_base_/default_runtime.py"]

# misc custom setting
batch_size: 2
mix_prob: 0.8
empty_cache: false
enable_amp: true

# model settings
model:
  type: DefaultSegmentor
  backbone:
    type: PT-v2m2
    in_channels: 4
    num_classes: 19
    patch_embed_depth: 1
    patch_embed_channels: 48
    patch_embed_groups: 6
    patch_embed_neighbours: 8
    enc_depths: [2, 2, 6, 2]
    enc_channels: [96, 192, 384, 512]
    enc_groups: [12, 24, 48, 64]
    enc_neighbours: [16, 16, 16, 16]
    dec_depths: [1, 1, 1, 1]
    dec_channels: [48, 96, 192, 384]
    dec_groups: [6, 12, 24, 48]
    dec_neighbours: [16, 16, 16, 16]
    grid_sizes: [0.15, 0.375, 0.9375, 2.34375]
    attn_qkv_bias: true
    pe_multiplier: false
    pe_bias: true
    attn_drop_rate: 0.0
    drop_path_rate: 0.3
    enable_checkpoint: false
    unpool_backend: map
  criteria:
    - type: CrossEntropyLoss
      weight: [3.1557, 8.7029, 7.8281, 6.1354, 6.3161, 7.9937, 8.9704, 10.1922, 1.6155, 4.2187, 1.9385, 5.5455, 2.0198, 2.6261, 1.3212, 5.1102, 2.5492, 5.8585, 7.3929]
      loss_weight: 1.0
      ignore_index: -1
    - type: LovaszLoss
      mode: multiclass
      loss_weight: 1.0
      ignore_index: -1

# scheduler settings
epoch: 50
eval_epoch: 50
optimizer:
  type: AdamW
  lr: 0.002
  weight_decay: 0.005
scheduler:
  type: OneCycleLR
  max_lr: 0.002
  pct_start: 0.04
  anneal_strategy: cos
  div_factor: 10.0
  final_div_factor: 100.0

# dataset settings
data:
  num_classes: 19
  ignore_index: -1
  names: ["car", "bicycle", "motorcycle", "truck", "other-vehicle", "person", "bicyclist", "motorcyclist", "road", "parking", "sidewalk", "other-ground", "building", "fence", "vegetation", "trunk", "terrain", "pole", "traffic-sign"]
  train:
    type: SemanticKITTIDataset
    split: train
    data_root: /info/corpus/SemanticKITTI
    transform:
      - type: RandomRotate
        angle: [-1, 1]
        axis: z
        center: [0, 0, 0]
        p: 0.5
      - type: RandomScale
        scale: [0.9, 1.1]
      - type: RandomFlip
        p: 0.5
      - type: RandomJitter
        sigma: 0.005
        clip: 0.02
      - type: GridSample
        grid_size: 0.05
        hash_type: fnv
        mode: train
        return_grid_coord: true
      - type: PointClip
        point_cloud_range: [-35.2, -35.2, -4, 35.2, 35.2, 2]
      - type: SphereCrop
        sample_rate: 0.8
        mode: random
      - type: SphereCrop
        point_max: 120000
        mode: random
      - type: ToTensor
      - type: Collect
        keys: ["coord", "grid_coord", "segment"]
        feat_keys: ["coord", "strength"]
    test_mode: false
    ignore_index: -1
  val:
    type: SemanticKITTIDataset
    split: val
    data_root: /info/corpus/SemanticKITTI
    transform:
      - type: Copy
        keys_dict:
          segment: origin_segment
      - type: GridSample
        grid_size: 0.05
        hash_type: fnv
        mode: train
        return_grid_coord: true
        return_inverse: true
      - type: PointClip
        point_cloud_range: [-35.2, -35.2, -4, 35.2, 35.2, 2]
      - type: ToTensor
      - type: Collect
        keys: ["coord", "grid_coord", "segment", "origin_segment", "inverse"]
        feat_keys: ["coord", "strength"]
    test_mode: false
    ignore_index: -1
  test:
    type: SemanticKITTIDataset
    split: val
    data_root: /info/corpus/SemanticKITTI
    transform:
      - type: PointClip
        point_cloud_range: [-35.2, -35.2, -4, 35.2, 35.2, 2]
      - type: Copy
        keys_dict:
          segment: origin_segment
      - type: GridSample
        grid_size: 0.025
        hash_type: fnv
        mode: train
        return_inverse: true
    test_mode: true
    test_cfg:
      voxelize:
        type: GridSample
        grid_size: 0.05
        hash_type: fnv
        mode: test
        return_grid_coord: true
      crop: null
      post_transform:
        - type: ToTensor
        - type: Collect
          keys: ["coord", "grid_coord", "index"]
          feat_keys: ["coord", "strength"]
      aug_transform:
        - - type: RandomRotateTargetAngle
            angle: [0]
            axis: z
            center: [0, 0, 0]
            p: 1
        - - type: RandomRotateTargetAngle
            angle: [0.5]
            axis: z
            center: [0, 0, 0]
            p: 1
        - - type: RandomRotateTargetAngle
            angle: [1]
            axis: z
            center: [0, 0, 0]
            p: 1
        - - type: RandomRotateTargetAngle
            angle: [1.5]
            axis: z
            center: [0, 0, 0]
            p: 1
    ignore_index: -1
